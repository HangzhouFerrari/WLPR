<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Saved — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

<div class="noise-overlay"></div>

<header class="app-header">
  <div class="header-inner">
    <span class="logo" data-i18n="saved">SAVED</span>
    <div class="header-right">
      <button class="theme-btn" onclick="quickToggleTheme()">☀</button>

      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

      <a class="empty-cta" onclick="nav('browse.html')" data-i18n="browse_now">BROWSE NOW →</a>
    </div>

    <div class="grid-2col" id="savedGrid"></div>
    <div class="bottomspace"></div>
  </main>
</div>

<nav class="bottom-nav"></nav>
<div class="nav-fade"></div>

<script src="assets/app.js"></script>
<script>initSavedPage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
