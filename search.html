<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Search — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body>
<div class="noise-overlay"></div>
<header class="app-header">
  <div class="header-inner">
    <button class="header-btn" onclick="history.back()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input"
             placeholder="SEARCH WALLPAPERS" autofocus
             data-i18n-ph="search_placeholder"/>
    </div>
  </div>
</header>

<div class="page-wrap">
  <!-- padding-top accounts for: safe-top + 52px header + 16px breathing room -->
  <main class="main-scroll">
    <div style="padding: 0 16px 16px">
      <div class="section-title" style="padding: 4px 0 12px" data-i18n="popular_tags">POPULAR TAGS</div>
      <div class="tag-row" id="popularTags"></div>
    </div>
    <div class="grid-2col" id="searchResults"></div>
    <div class="count-label" id="searchCount"></div>
    <div class="bottomspace"></div>
  </main>
</div>

<script src="assets/app.js"></script>
<script>initSearchPage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
