<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Wallpaper — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body class="detail-page">
<div class="noise-overlay"></div>

<!-- Full background -->
<div class="detail-bg" id="detailBg">
  <div class="detail-overlay"></div>
  <img class="detail-img" id="detailImg" src="" alt=""/>
</div>

<!-- Float buttons -->
<button class="float-btn float-back" onclick="history.back()">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
</button>
<div class="float-actions">
  <button class="float-btn float-save" id="saveBtn" onclick="toggleSave()">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </button>
  <button class="float-btn" onclick="openShare()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<!-- Bottom panel — 3 states: mini / normal / full -->
<div class="detail-panel" id="detailPanel" data-state="normal">

  <!-- Drag zone: handle + title visible in all states -->
  <div class="panel-drag-zone" id="panelDragZone">
    <!-- APK / LIVE type badge — shown only when relevant, sits above handle -->
    <div id="typeBadge" style="display:none;align-self:flex-start;margin-bottom:-4px"></div>
    <div class="panel-handle"></div>
    <div class="panel-header-row">
      <div>
        <div class="panel-title" id="panelTitle">—</div>
        <div class="panel-meta" id="panelMeta">—</div>
      </div>
      <div class="color-swatch" id="colorSwatch"></div>
    </div>
  </div>

  <!-- Scrollable content — only scrolls in "full" state -->
  <div class="panel-inner" id="panelInner">
    <div class="tag-row" id="tagRow"></div>

    <!-- APK info + guide (hidden for non-APK) -->
    <div id="apkSection" style="display:none">
      <div class="apk-info-row" id="apkInfoRow"></div>
      <div class="apk-guide" id="apkGuide"></div>
    </div>

    <a class="download-btn" id="downloadBtn" href="#">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span data-i18n="download">DOWNLOAD WALLPAPER</span>
    </a>

    <div class="similar-section">
      <div class="section-title" style="padding:0 0 12px" data-i18n="more_like_this">MORE LIKE THIS</div>
      <div class="horiz-scroll" id="similarRow"></div>
    </div>
    <div class="bottomspace"></div>
  </div>
</div>

<!-- Share sheet -->
<div class="share-overlay" id="shareOverlay" onclick="closeShare()"></div>
<div class="share-sheet" id="shareSheet">
  <div class="share-sheet-handle"></div>

  <div class="share-title-row">
    <div class="share-thumb" id="shareThumb"></div>
    <div>
      <div class="share-wp-title" id="shareWpTitle"></div>
      <div class="share-wp-sub" id="shareWpSub"></div>
    </div>
  </div>

  <!-- App row -->
  <div class="share-apps">
    <button class="share-app-btn" onclick="shareTo('whatsapp')">
      <div class="share-app-icon" style="background:#25d366">💬</div>
      <div class="share-app-label">WhatsApp</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('messenger')">
      <div class="share-app-icon" style="background:linear-gradient(135deg,#0078ff,#a334fa)">💬</div>
      <div class="share-app-label">Messenger</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('telegram')">
      <div class="share-app-icon" style="background:#2aabee">✈️</div>
      <div class="share-app-label">Telegram</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('instagram')">
      <div class="share-app-icon" style="background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)">📷</div>
      <div class="share-app-label">Instagram</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('x')">
      <div class="share-app-icon" style="background:#000;color:#fff;font-family:serif;font-weight:bold;font-size:20px">𝕏</div>
      <div class="share-app-label">X</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('tiktok')">
      <div class="share-app-icon" style="background:#000">🎵</div>
      <div class="share-app-label">TikTok</div>
    </button>
    <button class="share-app-btn" onclick="shareTo('outlook')">
      <div class="share-app-icon" style="background:#0078d4">📧</div>
      <div class="share-app-label">Email</div>
    </button>
    <button class="share-app-btn" onclick="nativeShare()">
      <div class="share-app-icon">⋯</div>
      <div class="share-app-label">More</div>
    </button>
  </div>

  <!-- Actions -->
  <div class="share-actions">
    <button class="share-action-row" onclick="copyLink()" data-share-action="copy">
      <div class="share-action-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </div>
      <span data-i18n="copy_link">Copy link</span>
    </button>
    <button class="share-action-row" onclick="nativeShare()">
      <div class="share-action-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </div>
      <span data-i18n="share">Share</span>
    </button>
    <button class="share-action-row" onclick="window.open(document.getElementById('detailImg').src,'_blank');closeShare()">
      <div class="share-action-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <span data-i18n="open_browser">Open in browser</span>
    </button>
  </div>

  <button class="share-cancel" onclick="closeShare()">CANCEL</button>
</div>

<script src="assets/app.js"></script>
<script>initDetailPage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
