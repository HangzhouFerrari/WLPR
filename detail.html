<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Wallpaper — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body class="detail-page">
<div class="noise-overlay"></div>

<!-- Full-screen background -->
<div class="detail-bg" id="detailBg">
  <div class="detail-overlay"></div>
  <img class="detail-img" id="detailImg" src="" alt=""/>
  <div id="typeBadge" style="display:none;position:absolute;bottom:272px;left:16px;z-index:2"></div>
</div>

<!-- Floating buttons -->
<button class="float-btn float-back" onclick="history.back()">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
</button>
<button class="float-btn float-save" id="saveBtn" onclick="toggleSave()">
  <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
</button>

<!-- Bottom panel -->
<div class="detail-panel" id="detailPanel">
  <div class="panel-handle"></div>

  <div class="panel-row">
    <div>
      <div class="panel-title" id="panelTitle">—</div>
      <div class="panel-meta" id="panelMeta">—</div>
    </div>
    <div class="color-swatch" id="colorSwatch"></div>
  </div>

  <div class="tag-row" id="tagRow"></div>

  <!-- APK info + guide (hidden for non-APK) -->
  <div id="apkSection" style="display:none">
    <div class="apk-info-row" id="apkInfoRow"></div>
    <div class="apk-guide" id="apkGuide"></div>
  </div>

  <!-- Download button -->
  <a class="download-btn" id="downloadBtn" href="#" download>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span data-i18n="download">DOWNLOAD WALLPAPER</span>
  </a>

  <!-- Similar -->
  <div class="similar-section">
    <div class="section-title" style="padding:0 0 12px" data-i18n="more_like_this">MORE LIKE THIS</div>
    <div class="horiz-scroll" id="similarRow"></div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>initDetailPage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
