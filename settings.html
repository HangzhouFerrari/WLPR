<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Settings — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body>
<div class="noise-overlay"></div>
<header class="app-header">
  <div class="header-inner">
    <span class="logo" data-i18n="more">MORE</span>
  </div>
</header>

<div class="page-wrap">
  <main class="main-scroll" style="padding-top:8px">
    <div class="settings-list">

      <div class="settings-section-label" data-i18n="settings_app">APP</div>

      <div class="settings-row" onclick="location.href='browse.html'">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </div>
          <span data-i18n="all_wallpapers">ALL WALLPAPERS</span>
        </div>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <div class="settings-row" onclick="location.href='saved.html'">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <span data-i18n="saved">SAVED</span>
        </div>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </div>

      <!-- DISPLAY -->
      <div class="settings-section-label" style="margin-top:24px" data-i18n="settings_display">DISPLAY</div>

      <div class="settings-row" style="cursor:default">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </div>
          <span data-i18n="settings_theme">THEME</span>
        </div>
        <div class="theme-options" id="themeOptions"></div>
      </div>

      <div class="settings-row" style="cursor:default">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </div>
          <span data-i18n="grid_size">GRID SIZE</span>
        </div>
        <div class="toggle-group" id="gridToggle">
          <button class="toggle-btn" data-val="2">2</button>
          <button class="toggle-btn" data-val="3">3</button>
        </div>
      </div>

      <!-- LANGUAGE -->
      <div class="settings-section-label" style="margin-top:24px" data-i18n="settings_language">LANGUAGE</div>

      <div class="settings-row" style="cursor:default">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <span data-i18n="settings_language">LANGUAGE</span>
        </div>
        <select class="lang-select" id="langSelect">
          <option value="en">English</option>
          <option value="nl">Nederlands</option>
        </select>
      </div>

      <!-- ABOUT -->
      <div class="settings-section-label" style="margin-top:24px" data-i18n="settings_about">ABOUT</div>

      <div class="settings-row" style="cursor:default">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <span data-i18n="version">VERSION</span>
        </div>
        <span style="font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--text3)">2.0.0</span>
      </div>

      <div class="settings-row" onclick="window.open('https://github.com/HangzhouFerrari/Q-BOCC','_blank')">
        <div class="settings-row-left">
          <div class="settings-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
          </div>
          <span data-i18n="github">GITHUB</span>
        </div>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </div>

    </div>

    <div class="app-wordmark">WLPR</div>
    <div class="bottomspace"></div>
  </main>
</div>

<nav class="bottom-nav"></nav>
<div class="nav-fade"></div>
<script src="assets/app.js"></script>
<script>initSettingsPage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
