<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Browse — WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body>
<div class="noise-overlay"></div>

<header class="app-header">
  <div class="header-inner">
    <button class="header-btn" onclick="history.back()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="logo" data-i18n="browse">BROWSE</span>
    <div class="header-right">
      <button class="theme-btn" onclick="quickToggleTheme()">☀</button>
      <button class="header-btn" onclick="nav('search.html')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-pill active" data-filter="all"      data-i18n="all">ALL</button>
  <button class="filter-pill"        data-filter="static"   data-i18n="static">STATIC</button>
  <button class="filter-pill"        data-filter="live"     data-i18n="live">LIVE</button>
  <button class="filter-pill"        data-filter="apk"      data-i18n="apk">APK</button>
  <button class="filter-pill"        data-filter="abstract" data-i18n="abstract">ABSTRACT</button>
  <button class="filter-pill"        data-filter="nature"   data-i18n="nature">NATURE</button>
  <button class="filter-pill"        data-filter="new"      data-i18n="new">NEW</button>
</div>

<div class="page-wrap" style="padding-top:0">
  <main class="main-scroll" style="padding-top:8px">
    <div class="grid-2col" id="browseGrid"></div>
    <div class="count-label" id="countLabel"></div>
    <div class="bottomspace"></div>
  </main>
</div>

<nav class="bottom-nav"></nav>
<div class="nav-fade"></div>

<script src="assets/app.js"></script>
<script>initBrowsePage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
