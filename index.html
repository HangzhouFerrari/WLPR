<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>WLPR</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WLPR"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="assets/i18n.js"></script>
  <script src="assets/data.js"></script>
</head>
<body>
<div class="noise-overlay"></div>

<header class="app-header">
  <div class="header-inner">
    <span class="logo">WLPR</span>
    <div class="header-right">
      <button class="theme-btn" onclick="quickToggleTheme()" title="Toggle theme">☀</button>
      <button class="header-btn" onclick="nav('search.html')">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="page-wrap">

  <!-- Hero -->
  <section class="hero-banner" id="heroBanner">
    <div class="hero-bg-gradient" id="heroBgGradient"></div>
    <img class="hero-bg-img" id="heroBgImg" src="" alt="" onerror="this.style.display='none'"/>
    <div class="hero-content">
      <div class="hero-tag" data-i18n="new_drop">NEW DROP</div>
      <h2 class="hero-title" id="heroTitle" style="transition:opacity 0.3s">—</h2>
      <p class="hero-sub" id="heroSub"></p>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab active" data-tab="all"    data-i18n="all">ALL</button>
    <button class="tab"        data-tab="static" data-i18n="static">STATIC</button>
    <button class="tab"        data-tab="live"   data-i18n="live">LIVE</button>
    <button class="tab"        data-tab="apk"    data-i18n="apk">APK</button>
  </div>

  <main class="main-scroll">

    <!-- New drops -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="recently_added">RECENTLY ADDED</span>
        <a class="section-link" onclick="nav('browse.html?filter=new')" data-i18n="see_all">SEE ALL →</a>
      </div>
      <div class="horiz-scroll" id="newDrops"></div>
    </section>

    <!-- Live -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="live_wallpapers">LIVE</span>
        <a class="section-link" onclick="nav('browse.html?filter=live')" data-i18n="see_all">SEE ALL →</a>
      </div>
      <div class="horiz-scroll" id="liveSection"></div>
    </section>

    <!-- APK -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="apk_wallpapers">APK LIVE</span>
        <a class="section-link" onclick="nav('browse.html?filter=apk')" data-i18n="see_all">SEE ALL →</a>
      </div>
      <div class="horiz-scroll" id="apkSection"></div>
    </section>

    <!-- Collections -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="collections">COLLECTIONS</span>
      </div>
      <div class="horiz-scroll" id="collectionsRow"></div>
    </section>

    <!-- Browse grid -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="browse">BROWSE</span>
        <a class="section-link" onclick="nav('browse.html')" data-i18n="see_all">SEE ALL →</a>
      </div>
      <div class="grid-2col" id="browseGrid"></div>
    </section>

    <div class="bottomspace"></div>
  </main>
</div>

<nav class="bottom-nav"></nav>
<div class="nav-fade"></div>

<script src="assets/app.js"></script>
<script>initHomePage();</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{})</script>
</body>
</html>
